<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
    <title>KiwiAI</title>
    <script src="scripts/theme.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css?family=Inter:100,200,300,regular,500,600,700,800,900,100italic,200italic,300italic,italic,500italic,600italic,700italic,800italic,900italic');

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-primary);
            color: var(--text-primary);
            font-family: "Inter", sans-serif;
            height: 100dvh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        button {
            background-color: var(--bg-elevated);
            border: 2px solid var(--border-default);
            color: var(--text-primary);
            padding: 6px 10px;
            text-align: center;
            text-decoration: none;
            display: inline-block;
            font-size: 16px;
            margin: 4px 2px;
            border-radius: 8px;
            cursor: pointer;
        }

        .providers {
            margin-top: 15px;
            border: 1px solid var(--border-default);
            background-color: var(--bg-secondary);
            border-radius: 8px;
            padding: 6px;
            padding-top: 0px;
            width: min-content;
        }

        .buttons {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            width: 500px;
        }

        h3 {
            color: var(--text-primary);
        }

        h3 a {
            color: var(--text-primary);
        }
    </style>
</head>
<body>
    <center>
        <h3 onclick="window.location = './'" style="position: fixed; top: 1px; left: 12px;">Return home</h3>
            <br>
            <br>
            <h3 href="https://github.com/mia13165/SillyTavern-BotBrowser" target="_blank" style="text-decoration: underline;">SillyTavern-BotBrowser</a></h3>
            <h3 href="https://discord.gg/aipresets" target="_blank" style="text-decoration: underline;">All Presets (Creators can be found here)</a></h3>
    </center>
</body>
</html>
